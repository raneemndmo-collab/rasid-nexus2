apiVersion: v1
kind: Namespace
metadata:
  name: rasid-platform
  labels:
    app.kubernetes.io/part-of: rasid-platform
    tier: oltp
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: rasid-oltp-quota
  namespace: rasid-platform
spec:
  hard:
    requests.cpu: "32"
    requests.memory: 64Gi
    limits.cpu: "64"
    limits.memory: 128Gi
    pods: "100"
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: rasid-platform
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-internal
  namespace: rasid-platform
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/part-of: rasid-platform
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/part-of: rasid-platform
    - to: []
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
