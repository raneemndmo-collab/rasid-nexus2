apiVersion: apps/v1
kind: Deployment
metadata:
  name: rasid-api
  namespace: rasid-platform
  labels:
    app: rasid-api
    tier: oltp
    phase: "0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rasid-api
  template:
    metadata:
      labels:
        app: rasid-api
        tier: oltp
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      nodeSelector:
        tier: oltp
      containers:
        - name: rasid-api
          image: rasid-platform:phase-0
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - secretRef:
                name: rasid-secrets
            - configMapRef:
                name: rasid-config
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          startupProbe:
            httpGet:
              path: /health
              port: 3000
            failureThreshold: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: rasid-api
  namespace: rasid-platform
spec:
  selector:
    app: rasid-api
  ports:
    - port: 3000
      targetPort: 3000
      name: http
  type: ClusterIP
