version: '3.9'

services:
  # ═══ PostgreSQL — 10 Databases ═══
  postgres:
    image: postgres:16-alpine
    container_name: rasid-postgres
    environment:
      POSTGRES_USER: rasid_admin
      POSTGRES_PASSWORD: rasid_admin_pass
      POSTGRES_DB: rasid_admin
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rasid_admin"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      postgres
        -c log_statement=all

  # ═══ Redis — K4 Config Cache ═══
  redis:
    image: redis:7-alpine
    container_name: rasid-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass redis_pass --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_pass", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ═══ NATS JetStream — K5 Event Bus ═══
  nats:
    image: nats:2.10-alpine
    container_name: rasid-nats
    ports:
      - "4222:4222"
      - "8222:8222"
    command: >
      --jetstream
      --store_dir /data
      --http_port 8222
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ═══ Prometheus — Monitoring ═══
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: rasid-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ../../infrastructure/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ═══ Grafana — Dashboards ═══
  grafana:
    image: grafana/grafana:10.4.0
    container_name: rasid-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: rasid_grafana
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  postgres_data:
  redis_data:
  nats_data:
  prometheus_data:
  grafana_data:
